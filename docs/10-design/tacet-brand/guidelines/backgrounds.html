<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; height:200px; display:grid; grid-template-columns:1fr 1fr; }
  .p { position:relative; overflow:hidden; display:flex; align-items:flex-end; padding:14px 16px; box-sizing:border-box; }
  .p img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .p code { position:relative; font-family:var(--font-mono); font-size:10px; }
</style></head>
<body>
  <div class="p" style="background:#0A0613"><img src="../assets/backgrounds/constellation-dark.svg" alt=""><code style="color:#9C92B2">constellation-dark.svg</code></div>
  <div class="p" style="background:#F8F7FC"><img src="../assets/backgrounds/constellation-light.svg" alt=""><code style="color:#776B8F">constellation-light.svg</code></div>
</body></html>
