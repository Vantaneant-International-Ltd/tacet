<!-- @dsCard group="Brand" viewport="700x170" subtitle="App icons: dark, light, iris, mono — plus favicon sizes" name="App icons" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; height:170px; background:var(--bg); display:flex; align-items:center; justify-content:center; gap:28px; }
  img.app { width:76px; height:76px; border-radius:17px; box-shadow:var(--shadow-2); }
  .fav { display:flex; align-items:flex-end; gap:14px; margin-left:16px; padding-left:28px; border-left:1px solid var(--border-subtle); }
  .fav figure { margin:0; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .fav figcaption { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <img class="app" src="../assets/logo/appicon-dark.svg" alt="">
  <img class="app" src="../assets/logo/appicon-light.svg" alt="">
  <img class="app" src="../assets/logo/appicon-iris.svg" alt="">
  <img class="app" src="../assets/logo/appicon-mono.svg" alt="">
  <div class="fav">
    <figure><img src="../assets/logo/favicon.svg" width="16" height="16" alt=""><figcaption>16</figcaption></figure>
    <figure><img src="../assets/logo/favicon.svg" width="32" height="32" alt=""><figcaption>32</figcaption></figure>
    <figure><img src="../assets/logo/favicon.svg" width="64" height="64" alt=""><figcaption>64</figcaption></figure>
  </div>
</body></html>
