<!-- @dsCard group="Colors" viewport="700x150" subtitle="Ink — violet-cast neutrals; no pure grey, no pure black" name="Ink neutrals" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; height:150px; background:var(--bg); display:flex; align-items:center; padding:0 20px; gap:6px; box-sizing:border-box; }
  .sw { flex:1; height:90px; border-radius:10px; display:flex; flex-direction:column; justify-content:flex-end; padding:7px; box-sizing:border-box; font-family:var(--font-mono); font-size:8.5px; line-height:12px; border:1px solid var(--border-subtle); }
</style></head>
<body>
  <script>
    const ramp = ['990','950','900','850','800','750','700','600','500','400','300','200','100','50','25'];
    document.body.innerHTML = ramp.map((s,i) =>
      `<div class="sw" style="background:var(--ink-${s});color:${i>8?'#55486F':'#C4BCD6'}"><span>${s}</span></div>`
    ).join('');
  </script>
</body></html>
