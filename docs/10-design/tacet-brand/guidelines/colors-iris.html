<!-- @dsCard group="Colors" viewport="700x150" subtitle="Iris — the single primary; presence and connection only" name="Iris ramp" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; height:150px; background:var(--bg); display:flex; align-items:center; padding:0 20px; gap:8px; box-sizing:border-box; }
  .sw { flex:1; height:90px; border-radius:10px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; box-sizing:border-box; font-family:var(--font-mono); font-size:9px; line-height:13px; }
</style></head>
<body>
  <script>
    const ramp = [['50','#F4F2FF',1],['100','#E9E4FF',1],['200','#D6CCFF',1],['300','#BCAAFF',1],['400','#A18BFF',1],['500','#8A70FF',0],['600','#7B61FF',0],['700','#6A4FE8',0],['800','#5740BF',0],['900','#453394',0],['950','#2A1D5E',0]];
    document.body.innerHTML = ramp.map(([s,h,darkText]) =>
      `<div class="sw" style="background:var(--iris-${s});color:${darkText?'#453394':'#E9E4FF'}"><span>${s}</span><span>${h}</span></div>`
    ).join('');
  </script>
</body></html>
