<!-- @dsCard group="Foundations" viewport="700x150" subtitle="8pt system with a 4px half-step" name="Spacing" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; height:150px; background:var(--bg); display:flex; align-items:flex-end; justify-content:center; gap:18px; padding:20px 20px 28px; box-sizing:border-box; }
  .s { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { background:var(--accent-soft); border:1px solid var(--iris-300); border-radius:4px; }
  code { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <script>
    const steps = [[1,4],[2,8],[3,12],[4,16],[5,24],[6,32],[7,48],[8,64],[9,96]];
    document.body.innerHTML = steps.map(([n,px]) =>
      `<div class="s"><div class="box" style="width:${px}px;height:${px}px"></div><code>${px}</code></div>`
    ).join('');
  </script>
</body></html>
